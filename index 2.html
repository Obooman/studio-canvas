<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Studio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">C</span>
          <div>
            <strong>Canvas Studio</strong>
            <span>未命名画板</span>
          </div>
        </div>
        <div class="toolbar toolbar-center">
          <button class="icon-button" id="undoBtn" title="撤销 (⌘Z)" aria-label="撤销">↶</button>
          <button class="icon-button" id="redoBtn" title="重做 (⇧⌘Z)" aria-label="重做">↷</button>
          <span class="divider"></span>
          <button class="icon-button" id="zoomOutBtn" title="缩小" aria-label="缩小">−</button>
          <button class="zoom-value" id="zoomResetBtn" title="重置缩放">100%</button>
          <button class="icon-button" id="zoomInBtn" title="放大" aria-label="放大">＋</button>
          <button class="icon-button" id="fitBtn" title="适应内容" aria-label="适应内容">⌗</button>
        </div>
        <div class="toolbar">
          <input id="fileInput" type="file" accept=".svg,.png,.jpg,.jpeg,.webp,image/*" hidden />
          <button class="button" id="uploadBtn" title="导入 SVG、PNG、JPG 图片">导入图片</button>
          <button class="button primary" id="exportBtn" title="导出 PNG">导出 PNG</button>
        </div>
      </header>

      <aside class="toolrail" aria-label="绘图工具">
        <button class="tool active" data-tool="select" title="选择 (V)"><span>↖</span><small>选择</small></button>
        <button class="tool" data-tool="hand" title="平移 (H / Space)"><span>✋</span><small>平移</small></button>
        <span class="rail-divider"></span>
        <button class="tool" data-tool="rect" title="矩形 (R)"><span>▭</span><small>矩形</small></button>
        <button class="tool" data-tool="ellipse" title="圆形 (O)"><span>○</span><small>圆形</small></button>
        <button class="tool" data-tool="triangle" title="三角形 (T)"><span>△</span><small>三角形</small></button>
        <button class="tool" data-tool="line" title="直线 (L)"><span>╱</span><small>直线</small></button>
        <button class="tool" data-tool="arrow" title="箭头 (A)"><span>↗</span><small>箭头</small></button>
        <button class="tool" data-tool="text" title="文字 (X)"><span>T</span><small>文字</small></button>
      </aside>

      <main class="workspace">
        <canvas id="canvas"></canvas>
        <div class="empty-state" id="emptyState">
          <strong>开始创作</strong>
          <span>拖动左侧图形工具，或直接粘贴图片</span>
          <span class="shortcut">⌘V 粘贴 · 滚轮缩放 · Space 拖动画布</span>
        </div>
        <div class="canvas-status">
          <span id="objectCount">0 个对象</span>
          <span id="cursorPosition">x 0 · y 0</span>
        </div>
      </main>

      <aside class="inspector">
        <section>
          <div class="section-title">属性</div>
          <div id="noSelection" class="muted-block">选择一个对象后可编辑属性</div>
          <div id="properties" hidden>
            <div class="object-type" id="objectType">对象</div>
            <div class="grid two">
              <label>X<input id="propX" type="number" step="1" /></label>
              <label>Y<input id="propY" type="number" step="1" /></label>
              <label>W<input id="propW" type="number" min="1" step="1" /></label>
              <label>H<input id="propH" type="number" min="1" step="1" /></label>
            </div>
            <label class="wide" id="textRow" hidden>文字内容<textarea id="propText" rows="3"></textarea></label>
            <div class="grid two">
              <label id="fillRow">填充<input id="propFill" type="color" /></label>
              <label>描边<input id="propStroke" type="color" /></label>
              <label>线宽<input id="propStrokeWidth" type="number" min="0" max="40" step="1" /></label>
              <label>透明度<input id="propOpacity" type="number" min="0" max="100" step="5" /></label>
            </div>
            <label class="wide" id="fontSizeRow" hidden>字号<input id="propFontSize" type="number" min="8" max="240" step="1" /></label>
            <div class="actions">
              <button class="button" id="duplicateBtn">复制对象</button>
              <button class="button danger" id="deleteBtn">删除</button>
            </div>
          </div>
        </section>

        <section class="layers-section">
          <div class="section-title">
            <span>图层</span>
            <div class="layer-actions">
              <button class="mini-button" id="layerUpBtn" title="上移一层">↑</button>
              <button class="mini-button" id="layerDownBtn" title="下移一层">↓</button>
            </div>
          </div>
          <div class="layers" id="layers"></div>
        </section>

        <section class="tips">
          <div class="section-title">快捷操作</div>
          <div><kbd>⌘ C</kbd><span>复制</span><kbd>⌘ V</kbd><span>粘贴</span></div>
          <div><kbd>⌘ X</kbd><span>剪切</span><kbd>⌫</kbd><span>删除</span></div>
          <div><kbd>Shift</kbd><span>等比缩放 / 约束方向</span></div>
        </section>
      </aside>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
